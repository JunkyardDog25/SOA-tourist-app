spring.application.name=purchaseService

server.servlet.context-path=/api/purchases

spring.neo4j.uri=${NEO4J_URI}
spring.neo4j.authentication.username=${NEO4J_USERNAME}
spring.neo4j.authentication.password=${NEO4J_PASSWORD}

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}

# Tour service integration
tour.service.url=${TOUR_SERVICE_URL:http://tour-service:8084}
tour.service.connect-timeout-ms=${TOUR_SERVICE_CONNECT_TIMEOUT_MS:3000}
tour.service.read-timeout-ms=${TOUR_SERVICE_READ_TIMEOUT_MS:5000}

grpc.server.port=${GRPC_SERVER_PORT:9093}