<!DOCTYPE html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ture na mapi</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Ture na mapi</h1>
      <p class="subtitle">Crtanje ture preko ključnih tačaka (GUIDE nalog)</p>
    </header>

    <main class="app-main">
      <section id="view-auth" class="panel">
        <h2>Prijava</h2>
        <p>Unesi JWT token sa auth servisa (nalog sa ulogom <strong>GUIDE</strong>).</p>
        <label class="field">
          <span>Bearer token</span>
          <textarea id="token-input" rows="4" placeholder="eyJhbGciOiJIUzI1NiIs..."></textarea>
        </label>
        <p id="auth-error" class="error"></p>
        <button type="button" id="btn-save-token" class="btn primary">Nastavi</button>
      </section>

      <section id="view-list" class="panel hidden">
        <div class="panel-head">
          <h2>Moje ture</h2>
          <div class="actions">
            <button type="button" id="btn-new-tour" class="btn primary">Nova tura</button>
            <button type="button" id="btn-logout" class="btn ghost">Odjava</button>
          </div>
        </div>
        <p id="list-error" class="error"></p>
        <ul id="tours-list" class="tours-list"></ul>
      </section>

      <section id="view-editor" class="panel hidden editor-layout">
        <div class="panel-head">
          <div>
            <button type="button" id="btn-back-list" class="btn ghost">← Nazad</button>
            <h2 id="editor-title">Tura</h2>
            <p id="editor-status" class="meta"></p>
          </div>
        </div>

        <div class="editor-grid">
          <aside class="sidebar">
            <h3>Ključne tačke</h3>
            <div class="sidebar-actions">
              <button type="button" id="btn-add-keypoint" class="btn primary">
                Dodaj tačku (klik na mapu)
              </button>
              <button type="button" id="btn-move-keypoint" class="btn">
                Promeni poziciju
              </button>
              <button type="button" id="btn-cancel-map" class="btn ghost">
                Otkaži izbor na mapi
              </button>
            </div>
            <ul id="keypoints-list" class="keypoints-list"></ul>

            <form id="keypoint-form" class="keypoint-form hidden">
              <h3 id="form-title">Ključna tačka</h3>
              <p class="form-note">
                Koordinate dolaze iz klika na mapu; možeš ih ručno precizirati.
              </p>
              <label class="field">
                <span>Naziv</span>
                <input id="kp-name" type="text" required maxlength="200" />
              </label>
              <label class="field">
                <span>Opis</span>
                <textarea id="kp-description" rows="3" required maxlength="2000"></textarea>
              </label>
              <label class="field">
                <span>URL slike (opciono)</span>
                <input id="kp-image-url" type="text" placeholder="https://..." />
              </label>
              <div class="coords-row">
                <label class="field">
                  <span>Širina (lat)</span>
                  <input id="kp-latitude" type="number" step="any" required />
                </label>
                <label class="field">
                  <span>Dužina (lng)</span>
                  <input id="kp-longitude" type="number" step="any" required />
                </label>
              </div>
              <p id="form-error" class="error"></p>
              <div class="form-actions">
                <button type="submit" id="btn-save-keypoint" class="btn primary">Sačuvaj</button>
                <button type="button" id="btn-delete-keypoint" class="btn danger">
                  Obriši tačku
                </button>
              </div>
            </form>
          </aside>

          <div class="map-wrap">
            <p id="map-hint" class="map-hint map-hint-info"></p>
            <div id="tour-map"></div>
          </div>
        </div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
