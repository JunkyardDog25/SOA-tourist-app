services:
  # ── API Gateway ───────────────────────────────────────────────────────────────
  api-gateway:
    build: ./api_gateway
    container_name: api-gateway
    ports:
      - "8000:8000"           # jedina ulazna tačka sa hosta
    environment:
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:8080
      BLOG_SERVICE_URL: http://blog-service:8080
      STAKEHOLDERS_SERVICE_URL: http://stakeholders-service:8080
    depends_on:
      - auth-service
      - blog-service
      - stakeholders-service
    networks:
      - shared-net             # shared-net je dovoljan — svi servisi su tu

  # ── Neo4j za Stakeholders servis ─────────────────────────────────────────────
  stakeholders-neo4j:
    image: neo4j:5
    container_name: stakeholders-neo4j
    environment:
      NEO4J_AUTH: ${SPRING_NEO4J_AUTHENTICATION_USERNAME}/${SPRING_NEO4J_AUTHENTICATION_PASSWORD}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - stakeholders-neo4j-data:/data
    networks:
      - stakeholders-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Stakeholders servis ───────────────────────────────────────────────────────
  stakeholders-service:
    build: ./stakeholders_service
    container_name: stakeholders-service
    environment:
      SPRING_NEO4J_URI: bolt://stakeholders-neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: ${SPRING_NEO4J_AUTHENTICATION_USERNAME}
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: ${SPRING_NEO4J_AUTHENTICATION_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
    depends_on:
      stakeholders-neo4j:
        condition: service_healthy
    networks:
      - stakeholders-net
      - shared-net

  # ── Neo4j za Blog servis ─────────────────────────────────────────────────────
  blog-neo4j:
    image: neo4j:5
    container_name: blog-neo4j
    environment:
      NEO4J_AUTH: ${SPRING_NEO4J_AUTHENTICATION_USERNAME}/${SPRING_NEO4J_AUTHENTICATION_PASSWORD}
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - blog-neo4j-data:/data
    networks:
      - blog-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Blog servis ───────────────────────────────────────────────────────────────
  blog-service:
    build: ./blog_service
    container_name: blog-service
    environment:
      SPRING_NEO4J_URI: bolt://blog-neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: ${SPRING_NEO4J_AUTHENTICATION_USERNAME}
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: ${SPRING_NEO4J_AUTHENTICATION_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
    depends_on:
      blog-neo4j:
        condition: service_healthy
    networks:
      - blog-net
      - shared-net

  # ── Neo4j za Auth servis ──────────────────────────────────────────────────────
  auth-neo4j:
    image: neo4j:5
    container_name: auth-neo4j
    environment:
      NEO4J_AUTH: ${SPRING_NEO4J_AUTHENTICATION_USERNAME}/${SPRING_NEO4J_AUTHENTICATION_PASSWORD}
    ports:
      - "7476:7474"
      - "7689:7687"
    volumes:
      - auth-neo4j-data:/data
    networks:
      - auth-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Auth servis ───────────────────────────────────────────────────────────────
  auth-service:
    build: ./auth_service
    container_name: auth-service
    environment:
      SPRING_NEO4J_URI: bolt://auth-neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: ${SPRING_NEO4J_AUTHENTICATION_USERNAME}
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: ${SPRING_NEO4J_AUTHENTICATION_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      STAKEHOLDERS_SERVICE_URL: http://stakeholders-service:8080/api/stakeholders
    depends_on:
      auth-neo4j:
        condition: service_healthy
    networks:
      - auth-net
      - shared-net

volumes:
  stakeholders-neo4j-data:
  blog-neo4j-data:
  auth-neo4j-data:

networks:
  stakeholders-net:
  blog-net:
  auth-net:
  shared-net: