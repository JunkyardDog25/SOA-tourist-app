services:
  # ── API Gateway ───────────────────────────────────────────────────────────────
  api-gateway:
    build: ./api_gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:8080
      BLOG_SERVICE_URL: http://blog-service:8080
      STAKEHOLDERS_SERVICE_URL: http://stakeholders-service:8080
      FOLLOWERS_SERVICE_URL: http://followers-service:8080
      PURCHASE_SERVICE_URL: http://purchase-service:8080
      FOLLOWERS_SERVICE_GRPC_HOST: followers-service
      FOLLOWERS_SERVICE_GRPC_PORT: 9091
      TOUR_SERVICE_URL: http://tour-service:8084
      TOUR_SERVICE_GRPC_HOST: tour-service
      TOUR_SERVICE_GRPC_PORT: 9092
    depends_on:
      - auth-service
      - blog-service
      - stakeholders-service
      - followers-service
      - tour-service
      - purchase-service
    networks:
      - shared-net

  # ── Neo4j za Stakeholders servis ─────────────────────────────────────────────
  stakeholders-neo4j:
    image: neo4j:5
    container_name: stakeholders-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - stakeholders-neo4j-data:/data
    networks:
      - stakeholders-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Stakeholders servis ───────────────────────────────────────────────────────
  stakeholders-service:
    build: ./stakeholders_service
    container_name: stakeholders-service
    environment:
      NEO4J_URI: bolt://stakeholders-neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
    depends_on:
      stakeholders-neo4j:
        condition: service_healthy
    networks:
      - stakeholders-net
      - shared-net

  # ── Neo4j za Blog servis ─────────────────────────────────────────────────────
  blog-neo4j:
    image: neo4j:5
    container_name: blog-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - blog-neo4j-data:/data
    networks:
      - blog-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Blog servis ───────────────────────────────────────────────────────────────
  blog-service:
    build: ./blog_service
    container_name: blog-service
    environment:
      NEO4J_URI: bolt://blog-neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
    depends_on:
      blog-neo4j:
        condition: service_healthy
    networks:
      - blog-net
      - shared-net

  # ── Neo4j za Auth servis ──────────────────────────────────────────────────────
  auth-neo4j:
    image: neo4j:5
    container_name: auth-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
    ports:
      - "7476:7474"
      - "7689:7687"
    volumes:
      - auth-neo4j-data:/data
    networks:
      - auth-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Auth servis ───────────────────────────────────────────────────────────────
  auth-service:
    build: ./auth_service
    container_name: auth-service
    environment:
      NEO4J_URI: bolt://auth-neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      STAKEHOLDERS_SERVICE_URL: http://stakeholders-service:8080/api/stakeholders
      GRPC_SERVER_PORT: 9090
    expose:
      - "9090"
    depends_on:
      auth-neo4j:
        condition: service_healthy
    networks:
      - auth-net
      - shared-net

  # ── Neo4j za Followers servis ──────────────────────────────────────────────────────
  followers-neo4j:
    image: neo4j:5
    container_name: followers-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
    ports:
      - "7477:7474"
      - "7690:7687"
    volumes:
      - followers-neo4j-data:/data
    networks:
      - followers-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Followers servis ───────────────────────────────────────────────────────────────
  followers-service:
    build: ./followers_service
    container_name: followers-service
    environment:
      NEO4J_URI: bolt://followers-neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      AUTH_SERVICE_GRPC_HOST: auth-service
      AUTH_SERVICE_GRPC_PORT: 9090
      GRPC_SERVER_PORT: 9091
    expose:
      - "9091"
    depends_on:
      followers-neo4j:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - followers-net
      - shared-net

  # ── MongoDB za Tour servis ────────────────────────────────────────────────────
  mongo-tour:
    image: mongo:7
    container_name: mongo-tour
    ports:
      - "27017:27017"
    volumes:
      - mongo-tour-data:/data/db
    networks:
      - tour-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Mongo Express (Web UI za MongoDB) ─────────────────────────────────────────
  mongo-express:
    image: mongo-express:1
    container_name: mongo-express
    ports:
      - "8088:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo-tour:27017
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo-tour:
        condition: service_healthy
    networks:
      - tour-net

  # ── Tour servis ───────────────────────────────────────────────────────────────
  tour-service:
    build: ./tour_service
    container_name: tour-service
    ports:
      - "8084:8084"
    environment:
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB}
      JWT_SECRET: ${JWT_SECRET}
      GRPC_SERVER_PORT: 9092
      PURCHASE_SERVICE_URL: http://purchase-service:8080
    expose:
      - "9092"
    depends_on:
      mongo-tour:
        condition: service_healthy
    networks:
      - tour-net
      - shared-net

  # ── Neo4j za Purchase servis ────────────────────────────────────────────────
  purchase-neo4j:
    image: neo4j:5
    container_name: purchase-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
    ports:
      - "7478:7474"
      - "7691:7687"
    volumes:
      - purchase-neo4j-data:/data
    networks:
      - purchase-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Purchase servis ───────────────────────────────────────────────────────────
  purchase-service:
    build: ./purchase_service
    container_name: purchase-service
    environment:
      NEO4J_URI: bolt://purchase-neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      SPRING_NEO4J_URI: bolt://purchase-neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: ${NEO4J_USERNAME}
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: ${NEO4J_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      TOUR_SERVICE_URL: http://tour-service:8084
    depends_on:
      purchase-neo4j:
        condition: service_healthy
    networks:
      - purchase-net
      - shared-net

  # ── Frontend (mapa tura) ──────────────────────────────────────────────────────
  tour-frontend:
    image: nginx:alpine
    container_name: tour-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-gateway
    networks:
      - shared-net

volumes:
  stakeholders-neo4j-data:
  blog-neo4j-data:
  auth-neo4j-data:
  followers-neo4j-data:
  mongo-tour-data:
  purchase-neo4j-data:

networks:
  stakeholders-net:
  blog-net:
  auth-net:
  followers-net:
  tour-net:
  purchase-net:
  shared-net:
