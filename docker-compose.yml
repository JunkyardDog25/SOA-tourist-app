version: "3.9"

services:
  # ── Neo4j za Stakeholders servis ─────────────────────────────────────────────
  stakeholders-neo4j:
    image: neo4j:5
    container_name: stakeholders-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
    ports:
      - "7474:7474" # Neo4j Browser
      - "7687:7687" # Bolt
    volumes:
      - stakeholders-neo4j-data:/data
    networks:
      - stakeholders-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Stakeholders servis ───────────────────────────────────────────────────────
  stakeholders-service:
    build: ./stakeholders_service
    container_name: stakeholders-service
    ports:
      - "8080:8080" # Dostupan klijentu sa hosta na :8080
    environment:
      SPRING_NEO4J_URI: bolt://stakeholders-neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: ${NEO4J_USERNAME}
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: ${NEO4J_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
    depends_on:
      stakeholders-neo4j:
        condition: service_healthy
    networks:
      - stakeholders-net # Komunicira sa svojom Neo4j bazom
      - shared-net # Dostupan blog servisu ako je potrebno

  # ── Neo4j za Blog servis ─────────────────────────────────────────────────────
  blog-neo4j:
    image: neo4j:5
    container_name: blog-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
    ports:
      - "7475:7474" # Neo4j Browser (drugačiji host port jer 7474 zauzet)
      - "7688:7687" # Bolt (drugačiji host port jer 7687 zauzet)
    volumes:
      - blog-neo4j-data:/data
    networks:
      - blog-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Blog servis ───────────────────────────────────────────────────────────────
  blog-service:
    build: ./blog_service
    container_name: blog-service
    ports:
      - "8082:8080" # Dostupan klijentu sa hosta na :8082
    environment:
      SPRING_NEO4J_URI: bolt://blog-neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: ${NEO4J_USERNAME}
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: ${NEO4J_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
    depends_on:
      blog-neo4j:
        condition: service_healthy
    networks:
      - blog-net # Komunicira sa svojom Neo4j bazom
      - shared-net # Dostupan stakeholders servisu ako je potrebno

  # ── Neo4j za Auth servis ──────────────────────────────────────────────────────
  auth-neo4j:
    image: neo4j:5
    container_name: auth-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
    ports:
      - "7476:7474"
      - "7689:7687"
    volumes:
      - auth-neo4j-data:/data
    networks:
      - auth-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Auth servis ───────────────────────────────────────────────────────────────
  auth-service:
    build: ./auth_service
    container_name: auth-service
    ports:
      - "8081:8080"
    environment:
      SPRING_NEO4J_URI: bolt://auth-neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: ${NEO4J_USERNAME}
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: ${NEO4J_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
    depends_on:
      auth-neo4j:
        condition: service_healthy
    networks:
      - auth-net
      - shared-net

volumes:
  stakeholders-neo4j-data:
  blog-neo4j-data:
  auth-neo4j-data:

networks:
  stakeholders-net: # Izolovana mreža: stakeholders-service <-> stakeholders-neo4j
  blog-net: # Izolovana mreža: blog-service <-> blog-neo4j
  auth-net: # Izolovana mreža: auth-service <-> auth-neo4j
  shared-net: # Zajednička mreža: servisi međusobno komuniciraju
